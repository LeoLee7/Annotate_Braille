// Google-Maps-style search with live suggestions from Nominatim.
// Debounced at 350ms to stay within Nominatim's 1 req/sec usage policy.
const searchInput = document.getElementById('map-search-input');
const suggestEl = document.getElementById('map-suggest');
let suggestTimer = null;
let currentSuggestions = [];
let highlightIdx = -1;

function escapeHtml(s) {
  return (s || '').replace(/[<>&"']/g, c => (
    { '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;' }[c]));
}

async function fetchSuggestions(q) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&limit=6&q=${encodeURIComponent(q)}`,
      { headers: { 'Accept-Language': 'en' } });
    const results = await r.json();
    if (!Array.isArray(results) || results.length === 0) { hideSuggest(); return; }
    currentSuggestions = results;
    highlightIdx = -1;
    suggestEl.innerHTML = results.map((res, i) => {
      const parts = (res.display_name || '').split(',').map(x => x.trim());
      const title = parts[0] || res.name || 'Unnamed';
      const sub = parts.slice(1).join(', ');
      return `<div class="map-suggest-item" data-idx="${i}">`
        + `<div class="title">${escapeHtml(title)}</div>`
        + `<div class="sub">${escapeHtml(sub)}</div></div>`;
    }).join('');
    suggestEl.style.display = 'block';
    suggestEl.querySelectorAll('.map-suggest-item').forEach(el => {
      el.addEventListener('click', () => pickSuggestion(currentSuggestions[+el.dataset.idx]));
    });
  } catch (e) { hideSuggest(); }
}

function pickSuggestion(res) {
  if (!res) return;
  leafletMap.setView([+res.lat, +res.lon], 17);
  searchInput.value = (res.display_name || '').split(',')[0];
  hideSuggest();
}

function hideSuggest() {
  suggestEl.style.display = 'none';
  currentSuggestions = [];
  highlightIdx = -1;
}

function updateHighlight() {
  suggestEl.querySelectorAll('.map-suggest-item').forEach((el, i) => {
    el.classList.toggle('active', i === highlightIdx);
  });
}

searchInput.addEventListener('input', () => {
  clearTimeout(suggestTimer);
  const q = searchInput.value.trim();
  if (q.length < 2) { hideSuggest(); return; }
  suggestTimer = setTimeout(() => fetchSuggestions(q), 350);
});

searchInput.addEventListener('keydown', e => {
  const visible = suggestEl.style.display === 'block';
  if (visible && e.key === 'ArrowDown') {
    e.preventDefault();
    highlightIdx = Math.min(currentSuggestions.length - 1, highlightIdx + 1);
    updateHighlight();
  } else if (visible && e.key === 'ArrowUp') {
    e.preventDefault();
    highlightIdx = Math.max(-1, highlightIdx - 1);
    updateHighlight();
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (visible && highlightIdx >= 0) {
      pickSuggestion(currentSuggestions[highlightIdx]);
    } else if (currentSuggestions.length) {
      // No arrow selection: pick the top suggestion.
      pickSuggestion(currentSuggestions[0]);
    } else {
      // No suggestions yet: fire a direct search with whatever is typed.
      const q = searchInput.value.trim();
      if (q) fetchSuggestions(q).then(() => {
        if (currentSuggestions.length) pickSuggestion(currentSuggestions[0]);
      });
    }
  } else if (e.key === 'Escape') {
    hideSuggest();
  }
});

document.getElementById('map-search-btn').addEventListener('click', () => {
  if (currentSuggestions.length) pickSuggestion(currentSuggestions[0]);
  else {
    const q = searchInput.value.trim();
    if (q) fetchSuggestions(q).then(() => {
      if (currentSuggestions.length) pickSuggestion(currentSuggestions[0]);
    });
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.map-search') && !e.target.closest('.map-suggest')) {
    hideSuggest();
  }
});

// Fast click → building match via prefetched in-memory polygon cache.
// Leaflet's map tiles are raster images, so building geometry/names must still
// come from Overpass. But we fetch the whole visible area ONCE per view, then
// clicks test point-in-polygon locally (zero latency, feels like Google Maps).
const OVERPASS_ENDPOINTS = [
  'https://overpass.kumi.systems/api/interpreter',
  'https://overpass-api.de/api/interpreter',
  'https://lz4.overpass-api.de/api/interpreter',
  'https://z.overpass-api.de/api/interpreter',
  'https://overpass.osm.ch/api/interpreter',
  'https://overpass.private.coffee/api/interpreter',
];

// Per-endpoint cooldown: if a mirror returns 403/429, don't retry it for 5 min.
// Prevents us from hammering a rate-limiting server on every subsequent click.
const OVERPASS_COOLDOWN_MS = 5 * 60 * 1000;
const overpassCooldown = new Map(); // url -> timestamp until which to skip

async function fetchWithTimeout(url, opts, ms) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  try { return await fetch(url, { ...opts, signal: ctrl.signal }); }
  finally { clearTimeout(t); }
}

// Race all healthy Overpass mirrors in parallel with Promise.any, then
// escalate the timeout if the first round all fails. Winner's response is
// returned; losing siblings are aborted immediately. Touch Mapper's server
// tries mirrors sequentially — that's actually a weakness we beat here.
async function queryOverpass(q, onStatus) {
  const rounds = [20000, 60000]; // 20s fast race, then 60s patient retry
  let lastErr;

  for (const timeoutMs of rounds) {
    const now = Date.now();
    const live = OVERPASS_ENDPOINTS.filter(
      url => (overpassCooldown.get(url) || 0) <= now);
    if (!live.length) break;

    if (onStatus) {
      onStatus(`Racing ${live.length} Overpass mirrors (${timeoutMs / 1000}s)...`);
    }

    const ctrls = live.map(() => new AbortController());
    const attempts = live.map((url, i) => {
      const ctrl = ctrls[i];
      const timer = setTimeout(() => ctrl.abort(), timeoutMs);
      return fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'data=' + encodeURIComponent(q),
        signal: ctrl.signal,
      }).then(async resp => {
        if (resp.status === 403 || resp.status === 429) {
          overpassCooldown.set(url, Date.now() + OVERPASS_COOLDOWN_MS);
          throw new Error(`${new URL(url).hostname}: HTTP ${resp.status}`);
        }
        if (!resp.ok) {
          throw new Error(`${new URL(url).hostname}: HTTP ${resp.status}`);
        }
        const data = await resp.json();
        // Some mirrors race back a valid-looking 200 with elements:[] when
        // they can't serve the query — if we accept it, Promise.any cancels
        // the siblings that would have returned real data. Reject empty
        // so a slower but real response gets to win.
        if (!Array.isArray(data.elements) || data.elements.length === 0) {
          throw new Error(`${new URL(url).hostname}: empty elements`);
        }
        ctrls.forEach((c, j) => { if (j !== i) c.abort(); });
        return data;
      }).finally(() => clearTimeout(timer));
    });

    try {
      return await Promise.any(attempts);
    } catch (aggErr) {
      lastErr = aggErr;
      // Fall through to the next round with a longer timeout.
    }
  }

  throw lastErr || new Error('All Overpass mirrors unreachable or rate-limited');
}

async function nominatimReverse(lat, lng) {
  const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=19`;
  const resp = await fetchWithTimeout(url, { headers: { 'Accept-Language': 'en' } }, 8000);
  if (!resp.ok) throw new Error(`Nominatim HTTP ${resp.status}`);
  return await resp.json();
}

// In-memory cache of buildings in the current (or recently-visited) map view.
// Persisted to localStorage so second visits are instant with no fetch.
const OSM_CACHE_KEY = 'osmBuildingCache_v2'; // v2: buildings enriched with POI names
const OSM_BOUNDS_KEY = 'osmCachedBounds_v2';
const OSM_CACHE_MAX_BYTES = 4 * 1024 * 1024; // rough cap before dropping oldest

let osmBuildingCache = [];
let cachedBoundsKeys = new Set();
let prefetchInFlight = null;
let osmPolyLayer = L.layerGroup().addTo(leafletMap);

// Status pill on the map. Collapses to just a dot when idle/ready, expands
// with inline text while fetching. In fetching state the label also shows
// elapsed seconds so the user can tell the request is still alive (Overpass
// often takes 5-30s and otherwise looks frozen).
const osmDot = document.getElementById('osm-status');
let osmDotFetchTimer = null;

// Remember the last 5 prefetch durations so the countdown adapts. Overpass
// latency varies wildly between mirrors, so a fixed estimate is misleading.
const OSM_FETCH_HISTORY_KEY = 'osmFetchHistory_v1';
function loadFetchHistory() {
  try {
    const arr = JSON.parse(localStorage.getItem(OSM_FETCH_HISTORY_KEY) || '[]');
    return Array.isArray(arr) ? arr.filter(n => typeof n === 'number' && n > 0) : [];
  } catch (e) { return []; }
}
function recordFetchDuration(ms) {
  const hist = loadFetchHistory();
  hist.push(ms);
  while (hist.length > 5) hist.shift();
  localStorage.setItem(OSM_FETCH_HISTORY_KEY, JSON.stringify(hist));
}
function estimateFetchMs() {
  const hist = loadFetchHistory();
  if (!hist.length) return 8000; // first-run guess: 8s
  // Use the average + a bit of slack so we don't hit 0 before it's done.
  const avg = hist.reduce((s, n) => s + n, 0) / hist.length;
  return Math.min(30000, Math.max(3000, avg * 1.15));
}

function setOsmDot(state, tip) {
  osmDot.classList.remove('fetching', 'ready', 'error');
  if (state) osmDot.classList.add(state);
  clearInterval(osmDotFetchTimer);
  osmDotFetchTimer = null;
  if (state === 'fetching') {
    const start = Date.now();
    const estMs = estimateFetchMs();
    const render = () => {
      const elapsed = Date.now() - start;
      const remainingSec = Math.max(0, Math.ceil((estMs - elapsed) / 1000));
      // Progress asymptotes toward 95% so we never pre-announce completion.
      const pct = Math.min(95, (elapsed / estMs) * 100);
      const label = remainingSec > 0
        ? `Parsing map… ~${remainingSec}s`
        : `Parsing map… almost done`;
      osmDot.innerHTML = `<span class="dot"></span><span class="text">${label}</span>`
        + `<span class="bar" style="width:${pct.toFixed(1)}%"></span>`;
    };
    render();
    osmDotFetchTimer = setInterval(render, 400);
  } else {
    const label = state === 'error' ? 'OSM failed' : '';
    osmDot.innerHTML = `<span class="dot"></span>${label ? `<span class="text">${label}</span>` : ''}`;
  }
  osmDot.title = tip || '';
}

function boundsKey(b) {
  return [b.getSouth(), b.getWest(), b.getNorth(), b.getEast()]
    .map(v => v.toFixed(4)).join(',');
}

function loadCacheFromStorage() {
  try {
    const raw = localStorage.getItem(OSM_CACHE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed)) osmBuildingCache = parsed;
    }
    const rawBounds = localStorage.getItem(OSM_BOUNDS_KEY);
    if (rawBounds) {
      const arr = JSON.parse(rawBounds);
      if (Array.isArray(arr)) cachedBoundsKeys = new Set(arr);
    }
  } catch (e) { osmBuildingCache = []; cachedBoundsKeys = new Set(); }
}

function saveCacheToStorage() {
  try {
    // Drop polygons one at a time if over quota (oldest first).
    let payload = JSON.stringify(osmBuildingCache);
    while (payload.length > OSM_CACHE_MAX_BYTES && osmBuildingCache.length > 100) {
      osmBuildingCache.splice(0, Math.ceil(osmBuildingCache.length * 0.2));
      payload = JSON.stringify(osmBuildingCache);
    }
    localStorage.setItem(OSM_CACHE_KEY, payload);
    localStorage.setItem(OSM_BOUNDS_KEY, JSON.stringify([...cachedBoundsKeys]));
  } catch (e) { /* quota exceeded: silently drop */ }
}

function redrawOsmPolys() {
  osmPolyLayer.clearLayers();
  const zoom = leafletMap.getZoom();
  const showLabels = zoom >= 16; // too cluttered below this
  for (const b of osmBuildingCache) {
    if (!b.polygon) continue;
    const poly = L.polygon(b.polygon, {
      color: b.name ? '#1e6fff' : '#555',
      weight: b.name ? 1.5 : 1,
      fillOpacity: b.name ? 0.15 : 0.28,
      fillColor: b.name ? '#4da3ff' : '#888',
      interactive: false,
    }).addTo(osmPolyLayer);
    if (b.name && showLabels) {
      // Permanent tooltip = every building name is visible all at once
      // (no need to click each one to see what's there).
      poly.bindTooltip(b.name, {
        permanent: true, direction: 'center',
        className: 'osm-label', opacity: 0.95,
      });
    }
  }
}
// Re-draw labels when the user zooms (so they disappear at low zoom).
leafletMap.on('zoomend', () => {
  if (osmBuildingCache.length) redrawOsmPolys();
});

function pointInPolygon(lat, lon, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const [yi, xi] = poly[i];
    const [yj, xj] = poly[j];
    if (((yi > lat) !== (yj > lat))
        && (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

function polygonCentroid(poly) {
  let lat = 0, lon = 0;
  for (const [la, lo] of poly) { lat += la; lon += lo; }
  return { lat: lat / poly.length, lon: lon / poly.length };
}

function haversineM(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2
    + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function findCachedBuilding(lat, lon) {
  for (const b of osmBuildingCache) {
    if (b.polygon && pointInPolygon(lat, lon, b.polygon)) return b;
  }
  // Fallback: nearest cached building centroid within 25m (helps with tiny gaps)
  let best = null, bestDist = Infinity;
  for (const b of osmBuildingCache) {
    const d = haversineM(lat, lon, b.center.lat, b.center.lon);
    if (d < bestDist) { bestDist = d; best = b; }
  }
  return bestDist < 25 ? best : null;
}

function isBoundsCovered(bounds) {
  const s = bounds.getSouth(), w = bounds.getWest();
  const n = bounds.getNorth(), e = bounds.getEast();
  for (const keyStr of cachedBoundsKeys) {
    const [cs, cw, cn, ce] = keyStr.split(',').map(Number);
    if (cs <= s && cn >= n && cw <= w && ce >= e) return true;
  }
  return false;
}

async function prefetchBuildings(bounds, { force = false } = {}) {
  const key = boundsKey(bounds);
  // Skip if we've already fetched a superset of this view. Panning a few
  // pixels changes the exact bounds key but shouldn't trigger a new fetch.
  // `force` bypasses this — used when the user explicitly clicks the button,
  // so they can refetch even over a stale/evicted cache.
  if (!force && (cachedBoundsKeys.has(key) || isBoundsCovered(bounds))) {
    setOsmDot('ready', `OSM cache: ${osmBuildingCache.length} buildings (from localStorage)`);
    return;
  }
  if (prefetchInFlight) return prefetchInFlight;
  const s = bounds.getSouth(), w = bounds.getWest();
  const n = bounds.getNorth(), e = bounds.getEast();
  // Query both buildings (polygons) AND named POIs (nodes). OSM often stores
  // the building polygon without a name, while the name lives on a POI node
  // inside it (e.g. "Taj Campton Place Hotel" is a tourism=hotel node within
  // an anonymous way). We cross-reference below to attach POI names to their
  // enclosing buildings.
  const q = `[out:json][timeout:25];`
    + `(way["building"](${s},${w},${n},${e});`
    + `node["name"](${s},${w},${n},${e}););`
    + `out tags geom;`;
  setOsmDot('fetching', 'Prefetching OSM buildings + POIs for this view...');
  const fetchStart = Date.now();
  prefetchInFlight = (async () => {
    try {
      const data = await queryOverpass(q, null);
      recordFetchDuration(Date.now() - fetchStart);
      const all = data.elements || [];
      const buildings = all.filter(el =>
        el.type === 'way' && el.geometry && el.geometry.length >= 3);
      const namedPois = all.filter(el =>
        el.type === 'node' && el.tags
        && (el.tags.name || el.tags.operator || el.tags.brand));
      const existingIds = new Set(osmBuildingCache.map(b => `${b.osm_type}/${b.osm_id}`));
      let added = 0;
      for (const el of buildings) {
        if (existingIds.has(`way/${el.id}`)) continue;
        const poly = el.geometry.map(p => [p.lat, p.lon]);
        const tags = el.tags || {};
        // Building's own name tag wins; otherwise inherit from an enclosed POI.
        let name = tags.name || tags.operator || tags.brand || '';
        let nameSource = name ? 'building' : null;
        let poiOsmId = null;
        if (!name) {
          for (const poi of namedPois) {
            if (pointInPolygon(poi.lat, poi.lon, poly)) {
              const pt = poi.tags;
              name = pt.name || pt.operator || pt.brand;
              nameSource = 'poi';
              poiOsmId = poi.id;
              break;
            }
          }
        }
        osmBuildingCache.push({
          polygon: poly,
          center: polygonCentroid(poly),
          tags, name,
          nameSource,
          poi_osm_id: poiOsmId,
          osm_id: el.id,
          osm_type: 'way',
        });
        added++;
      }
      cachedBoundsKeys.add(key);
      redrawOsmPolys();
      saveCacheToStorage();
      const namedCount = osmBuildingCache.filter(b => b.name).length;
      setOsmDot('ready',
        `OSM cache: ${osmBuildingCache.length} buildings, ${namedCount} named (+${added})`);
    } catch (err) {
      setOsmDot('error', 'OSM prefetch failed: ' + err.message);
    } finally {
      prefetchInFlight = null;
    }
  })();
  return prefetchInFlight;
}

// Fetch is fully manual: moveend and cache-miss clicks never trigger Overpass.
// User presses "Fetch this view" when they actually want data for a new area.
const fetchNowBtn = document.getElementById('osm-fetch-now');
fetchNowBtn.addEventListener('click', () => {
  prefetchBuildings(leafletMap.getBounds(), { force: true });
});

// On page load: just show what's already in localStorage. No auto-prefetch.
loadCacheFromStorage();
if (osmBuildingCache.length > 0) {
  redrawOsmPolys();
  setOsmDot('ready', `OSM cache: ${osmBuildingCache.length} buildings (from localStorage)`);
} else {
  setOsmDot(null, 'OSM cache empty; press "Fetch this view"');
}

let osmMarker = null;
// Bidirectional link: when user clicks the map BEFORE picking an STL region,
// remember the OSM match; the next rooftop click (or free-label placement)
// consumes it. Forward flow (STL first → map) still works exactly as before.
let pendingOsmMatch = null;

function setModeHint(text, color) {

  el.style.color = color || '';
}

// Custom confirm modal so we can style it (browser-native confirm shows an
// ugly "127.0.0.1 says" header we can't control).
function showConfirm({ title, current, replacement, okText, cancelText }) {
  return new Promise(resolve => {
    const modal = document.getElementById('confirm-modal');
    const titleEl = document.getElementById('modal-title');
    const curEl = document.getElementById('modal-current');
    const newEl = document.getElementById('modal-new');
    const okBtn = document.getElementById('modal-ok');
    const cancelBtn = document.getElementById('modal-cancel');
    titleEl.textContent = title || 'Confirm';
    curEl.textContent = current || '';
    newEl.textContent = replacement || '';
    okBtn.textContent = okText || 'Replace';
    cancelBtn.textContent = cancelText || 'Cancel';
    const cleanup = (result) => {
      modal.classList.remove('show');
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
      modal.removeEventListener('click', onBackdrop);
      document.removeEventListener('keydown', onKey);
      resolve(result);
    };
    const onOk = () => cleanup(true);
    const onCancel = () => cleanup(false);
    const onBackdrop = (e) => { if (e.target === modal) cleanup(false); };
    const onKey = (e) => {
      if (e.key === 'Escape') cleanup(false);
      else if (e.key === 'Enter') cleanup(true);
    };
    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
    modal.addEventListener('click', onBackdrop);
    document.addEventListener('keydown', onKey);
    modal.classList.add('show');
    setTimeout(() => okBtn.focus(), 20);
  });
}

// Rule-based OSM classifier aligned with touch-mapper-master's
// map-description-classifications.json. Returns { mainClass, subClass,
// category, keyTags } so the annotator's exported JSON can be cross-referenced
// with Touch Mapper's digital-description categories (A/B/C/D/E).
const OSM_BUILDING_LANDMARK = new Set([
  'church','cathedral','chapel','mosque','synagogue','temple','shrine',
  'castle','palace','monastery',
]);
const OSM_BUILDING_PUBLIC = new Set([
  'school','university','college','kindergarten','hospital','public',
  'government','civic','train_station','fire_station','police','townhall','library',
]);
const OSM_AMENITY_LANDMARK = new Set(['place_of_worship']);
const OSM_AMENITY_PUBLIC = new Set([
  'school','university','college','kindergarten','hospital','clinic','doctors',
  'pharmacy','police','fire_station','townhall','courthouse','library',
]);
const OSM_AMENITY_TRANSPORT = new Set([
  'bus_station','taxi','ferry_terminal','bicycle_parking','parking',
]);
const OSM_AMENITY_CIVIC = new Set([
  'atm','bank','post_office','post_box','recycling','toilets',
  'drinking_water','vending_machine','charging_station',
]);
const OSM_AMENITY_COMMERCIAL = new Set([
  'restaurant','cafe','bar','pub','fast_food','food_court','ice_cream',
  'biergarten','fuel','marketplace',
]);
const OSM_AMENITY_LEISURE = new Set([
  'theatre','cinema','arts_centre','community_centre','nightclub',
  'conference_centre','events_venue','planetarium',
]);

function classifyOsmFeature(tags, osmType) {
  tags = tags || {};
  const building = tags.building;
  const amenity = tags.amenity;
  const tourism = tags.tourism;
  const historic = tags.historic;
  const shop = tags.shop;
  const leisure = tags.leisure;
  const railway = tags.railway;
  const hasWikidata = !!tags.wikidata;

  // C — Buildings
  if (building) {
    if (OSM_BUILDING_LANDMARK.has(building)
        || (amenity && OSM_AMENITY_LANDMARK.has(amenity))
        || historic || (tourism && tourism !== 'hotel') || hasWikidata) {
      return { mainClass: 'C', subClass: 'C1_landmark',
               category: 'Landmark building',
               keyTags: pickKeyTags(tags) };
    }
    if (OSM_BUILDING_PUBLIC.has(building)
        || (amenity && OSM_AMENITY_PUBLIC.has(amenity))
        || (tags['building:use'] && OSM_BUILDING_PUBLIC.has(tags['building:use']))) {
      return { mainClass: 'C', subClass: 'C2_public',
               category: publicBuildingLabel(building, amenity),
               keyTags: pickKeyTags(tags) };
    }
    return { mainClass: 'C', subClass: 'C3_other_buildings',
             category: 'Building',
             keyTags: pickKeyTags(tags) };
  }

  // D — POIs (Familiar places)
  if (railway === 'station' || railway === 'tram_stop' || railway === 'subway_entrance'
      || (amenity && OSM_AMENITY_TRANSPORT.has(amenity))
      || tags.public_transport) {
    return { mainClass: 'D', subClass: 'D1_transport',
             category: 'Transport POI', keyTags: pickKeyTags(tags) };
  }
  if (amenity && OSM_AMENITY_CIVIC.has(amenity)) {
    return { mainClass: 'D', subClass: 'D2_civic',
             category: humanize(amenity), keyTags: pickKeyTags(tags) };
  }
  if (shop || (amenity && OSM_AMENITY_COMMERCIAL.has(amenity))) {
    return { mainClass: 'D', subClass: 'D3_commercial',
             category: shop ? `${humanize(shop)} shop` : humanize(amenity),
             keyTags: pickKeyTags(tags) };
  }
  if (leisure || tourism
      || (amenity && OSM_AMENITY_LEISURE.has(amenity))) {
    return { mainClass: 'D', subClass: 'D4_leisure_cultural',
             category: humanize(leisure || tourism || amenity),
             keyTags: pickKeyTags(tags) };
  }
  if (osmType === 'node') {
    return { mainClass: 'D', subClass: 'D_other_pois',
             category: humanize(amenity || tourism || 'POI'),
             keyTags: pickKeyTags(tags) };
  }
  return { mainClass: null, subClass: null, category: null,
           keyTags: pickKeyTags(tags) };
}

function publicBuildingLabel(building, amenity) {
  if (building === 'university' || amenity === 'university' || amenity === 'college')
    return 'University building';
  if (building === 'school' || amenity === 'school') return 'School building';
  if (building === 'hospital' || amenity === 'hospital') return 'Hospital';
  if (amenity === 'library' || building === 'library') return 'Library building';
  if (building === 'train_station') return 'Train station building';
  return humanize(building || amenity) + ' building';
}

function humanize(s) {
  if (!s) return '';
  return s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// Pick only the tags useful for description/semantic sorting. Keeps exported
// JSON small while preserving everything needed to regenerate classifications.
function pickKeyTags(tags) {
  if (!tags) return {};
  const keep = ['building','building:use','amenity','shop','tourism','historic',
    'leisure','railway','public_transport','office','operator','brand',
    'wikidata','wikipedia'];
  const out = {};
  for (const k of keep) if (tags[k] != null) out[k] = tags[k];
  return out;
}

// Spatial hint in the Touch Mapper style: the polygon centroid's position
// inside the current map view, rendered as a short English phrase plus an
// optional edge flag and coverage percentage. Computed against the current
// Leaflet view bounds at attach time; stored alongside the osm record so the
// same phrase survives re-exports.
function computeSpatialHint(match, bounds) {
  if (!bounds) return null;
  const s = bounds.getSouth(), w = bounds.getWest();
  const n = bounds.getNorth(), e = bounds.getEast();
  const latRange = n - s, lonRange = e - w;
  if (latRange <= 0 || lonRange <= 0) return null;
  // Normalized position 0..1 (0 = S/W, 1 = N/E)
  const nx = (match.center.lon - w) / lonRange;
  const ny = (match.center.lat - s) / latRange;
  const horiz = nx < 0.33 ? 'west' : nx > 0.67 ? 'east' : 'center';
  const vert  = ny < 0.33 ? 'south' : ny > 0.67 ? 'north' : 'center';
  let position;
  if (horiz === 'center' && vert === 'center') position = 'In the center';
  else if (horiz === 'center') position = `In the ${vert} part`;
  else if (vert === 'center')  position = `In the ${horiz} part`;
  else position = `In the ${vert}-${horiz} corner`;
  const edgeMargin = 0.08;
  let edge = null;
  if (nx < edgeMargin) edge = 'west';
  else if (nx > 1 - edgeMargin) edge = 'east';
  else if (ny < edgeMargin) edge = 'south';
  else if (ny > 1 - edgeMargin) edge = 'north';
  const hint = { position, edge,
    viewBounds: { south: s, west: w, north: n, east: e } };
  if (match.polygon && match.polygon.length >= 3) {
    const coverage = polygonCoveragePct(match.polygon, bounds);
    if (coverage != null) hint.coveragePct = +coverage.toFixed(2);
  }
  return hint;
}

function polygonCoveragePct(poly, bounds) {
  // Shoelace area in degree^2 (small areas, flat-earth approximation OK).
  let a = 0;
  for (let i = 0; i < poly.length; i++) {
    const [y1, x1] = poly[i];
    const [y2, x2] = poly[(i + 1) % poly.length];
    a += x1 * y2 - x2 * y1;
  }
  const polyArea = Math.abs(a) / 2;
  const bboxArea = (bounds.getNorth() - bounds.getSouth())
    * (bounds.getEast() - bounds.getWest());
  if (bboxArea <= 0) return null;
  return (polyArea / bboxArea) * 100;
}

function buildOsmRecord(match, source) {
  const classification = classifyOsmFeature(match.tags, match.osm_type);
  const spatial = computeSpatialHint(match, leafletMap.getBounds());
  return {
    lat: match.center.lat, lon: match.center.lon,
    osm_id: match.osm_id, osm_type: match.osm_type,
    name: match.name || null,
    source,
    mainClass: classification.mainClass,
    subClass: classification.subClass,
    category: classification.category,
    keyTags: classification.keyTags,
    spatial,
  };
}

async function applyOsmMatchToRegion(region, match, source) {
  const osmName = match.name;
  const currentOsmId = region.osm && region.osm.osm_id;
  const isReplacement = currentOsmId != null && currentOsmId !== match.osm_id;

  if (isReplacement) {
    const currentLabel = region.osm.name || region.name || 'previous match';
    const newLabel = osmName || '(unnamed)';
    const ok = await showConfirm({
      title: `Replace OSM link on Region #${region.id}?`,
      current: currentLabel,
      replacement: newLabel,
      okText: 'Replace',
      cancelText: 'Keep current',
    });
    if (!ok) {
      // Restore the existing marker so the user sees what's still attached.
      drawOsmMarker({
        center: { lat: region.osm.lat, lon: region.osm.lon },
        name: region.osm.name,
        osm_id: region.osm.osm_id, osm_type: region.osm.osm_type,
      }, false);
      setOsmDot('ready', `Kept: ${currentLabel}`);
      return;
    }
    // Confirmed: overwrite every field so the new OSM entity takes over.
    if (osmName) {
      region.name = osmName;
      region.description = osmName;
      region.code = makeCode(osmName);
    }
    region.osm = buildOsmRecord(match, source);
  } else {
    // Fresh attach (or re-click on the same OSM entity): fill empty fields only,
    // preserving any manual edits the user has typed.
    if (osmName && !region.name) region.name = osmName;
    if (osmName && !region.description) region.description = osmName;
    if (osmName && !region.code) region.code = makeCode(osmName);
    if (!region.osm) {
      region.osm = buildOsmRecord(match, source);
    }
  }

  if (region.code) ensureUid(region);
  updateBrailleMesh(region);
  resetAllColors();
  if (region.faceIndices && region.faceIndices.length) {
    highlightRegion(region, SELECTED_COLOR);
  }
  renderDetail();
  renderLegend();
  updateStatus();
  autoSave();
  drawOsmMarker(match, false);
  setOsmDot('ready',
    `${source}: ${osmName || '(unnamed)'} @ ${match.center.lat.toFixed(6)}, ${match.center.lon.toFixed(6)}`);
}

function setPendingOsmMatch(match, source) {
  pendingOsmMatch = { match, source };
  drawOsmMarker(match, true);
  setModeHint(
    `OSM picked: ${match.name || '(unnamed)'} — click a rooftop to attach`,
    '#ff9933');
  setOsmDot('ready', `Pending: ${match.name || '(unnamed)'}`);
}

function consumePendingOsmMatch(region) {
  if (!pendingOsmMatch || !region) return false;
  const { match, source } = pendingOsmMatch;
  pendingOsmMatch = null;
  setModeHint('Click a rooftop to select');
  applyOsmMatchToRegion(region, match, source);
  return true;
}

leafletMap.on('click', async (e) => {
  const { lat, lng } = e.latlng;

  let match = findCachedBuilding(lat, lng);
  let source = match ? 'cache' : '';
  // No implicit fetch on cache-miss — fetching is fully manual via the button.

  if (!match) {
    try {
      const nom = await nominatimReverse(lat, lng);
      if (nom && nom.osm_id) {
        // Only accept an actual name tag from Nominatim. display_name is a
        // postal address like "21250 Stevens Creek Blvd" and would fill garbage.
        const nomName = nom.name
          || (nom.namedetails && nom.namedetails.name)
          || '';
        match = {
          polygon: null,
          center: { lat: parseFloat(nom.lat), lon: parseFloat(nom.lon) },
          tags: {},
          name: nomName,
          osm_id: nom.osm_id, osm_type: nom.osm_type,
        };
        source = 'nominatim';
      }
    } catch (err) {}
  }

  if (!match) {
    setOsmDot('ready', 'No building at this point');
    return;
  }

  // If a region is already selected, apply immediately (forward flow).
  // applyOsmMatchToRegion will pop a confirm dialog when the new OSM differs
  // from the region's existing OSM, so the user can replace or keep.
  // If nothing is selected, queue the match for the next rooftop click (reverse).
  if (selectedRegion) {
    applyOsmMatchToRegion(selectedRegion, match, source);
  } else {
    setPendingOsmMatch(match, source);
  }
});

// Resizable panel
const vResizer = document.getElementById('v-resizer');
const canvasCont = document.getElementById('canvas-container');
const mapCont = document.getElementById('map-container');
let vResizing = false;
vResizer.addEventListener('mousedown', e => { vResizing = true; e.preventDefault(); });
document.addEventListener('mousemove', e => {
  if (!vResizing) return;
  const mid = document.querySelector('.mid');
  const rect = mid.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const pct = (x / rect.width) * 100;
  canvasCont.style.flex = `0 0 ${pct}%`;
  mapCont.style.flex = `0 0 ${100 - pct}%`;
  resize();
  leafletMap.invalidateSize();
});
document.addEventListener('mouseup', () => { vResizing = false; });

// Fix leaflet size after layout settles
setTimeout(() => leafletMap.invalidateSize(), 500);

// Auto-load a default example STL so a cold page open shows a real model
// instead of an empty scene. Silent fail when opened via file:// (fetch
// blocked by the browser) or when the example file is missing — the user
// can still drag-and-drop their own STL.
(async () => {
  try {
    const url = 'examples/ucsc/Engineering%202.stl';
    const resp = await fetch(url);
    if (!resp.ok) return;
    const buf = await resp.arrayBuffer();
    loadSTL(buf, 'Engineering 2.stl');
  } catch (e) { /* file:// or offline; user loads manually */ }
})();
</script>
