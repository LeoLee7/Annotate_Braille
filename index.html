<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Braille Editor 3D</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#1a1a1a;color:#222;overflow:hidden;height:100vh}
.app{display:grid;grid-template-columns:1fr 280px;grid-template-rows:40px 1fr;height:100vh}
.mid{grid-column:1;grid-row:2}
.topbar{grid-column:1/-1;background:#222;border-bottom:1px solid #333;display:flex;align-items:center;padding:0 12px;gap:10px;z-index:10}
.topbar h1{font-size:13px;font-weight:600;color:#ccc;white-space:nowrap}
.topbar .hint{font-size:11px;color:#666;margin-left:8px}
.topbar .spacer{flex:1}
.topbar button{font-size:11px;padding:5px 12px;border:none;border-radius:4px;cursor:pointer}
.topbar input[type=file]{display:none}
.btn-p{background:#4a9eff;color:#fff}.btn-p:hover{background:#3a8eef}
.btn-s{background:#444;color:#ccc}.btn-s:hover{background:#555}
.mid{display:flex;overflow:hidden}
#canvas-container{position:relative;overflow:hidden;background:#2a2a2a;flex:1}
#info-overlay{position:absolute;bottom:10px;left:10px;color:#888;font-size:11px;z-index:5;pointer-events:none}
.v-resizer{width:5px;background:#333;cursor:col-resize;flex-shrink:0}.v-resizer:hover{background:#555}
#map-container{position:relative;flex:0 0 35%;min-width:150px;overflow:hidden}
#leaflet-map{position:absolute;inset:0}
.map-search{position:absolute;top:8px;right:8px;z-index:1000;display:flex;gap:3px}
.map-search input{padding:4px 6px;font-size:11px;border:1px solid #aaa;border-radius:3px;width:150px}
.map-search button{padding:4px 8px;font-size:10px;border:none;border-radius:3px;background:#fff;cursor:pointer}
.osm-status{position:absolute;top:10px;left:60px;z-index:1000;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.92);padding:4px 8px;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.25);font-size:11px;font-weight:600;color:#555;cursor:help;transition:all .2s;overflow:hidden}
.osm-status .bar{position:absolute;left:0;bottom:0;height:2px;background:#ffa500;width:0;transition:width .4s linear;pointer-events:none}
.osm-status .dot{width:10px;height:10px;border-radius:50%;background:#888;flex-shrink:0}
.osm-status.fetching .dot{background:#ffa500;animation:osm-pulse 1s infinite}
.osm-status.fetching{color:#b36b00}
.osm-status.ready .dot{background:#2ecc71}
.osm-status.error .dot{background:#e74c3c}
.osm-status.error{color:#c0392b}
@keyframes osm-pulse{0%,100%{opacity:1}50%{opacity:.3}}
.osm-label{background:rgba(255,255,255,.9);border:1px solid #1e6fff;border-radius:3px;padding:1px 4px;font-size:10px;font-weight:600;color:#111;box-shadow:0 1px 2px rgba(0,0,0,.2);white-space:nowrap;pointer-events:none}
.osm-label::before{border:none!important}
.map-suggest{position:absolute;top:38px;right:8px;width:220px;background:#fff;border:1px solid #aaa;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:1100;display:none;max-height:260px;overflow-y:auto}
.map-suggest-item{padding:6px 8px;border-bottom:1px solid #f0f0f0;cursor:pointer;font-size:11px}
.map-suggest-item:last-child{border-bottom:0}
.map-suggest-item:hover,.map-suggest-item.active{background:#e8f0fe}
.map-suggest-item .title{font-weight:600;color:#222}
.map-suggest-item .sub{font-size:9px;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@keyframes btn-flash-attn{0%,100%{box-shadow:0 0 0 0 rgba(255,180,0,0);outline:2px solid rgba(255,180,0,0)}50%{box-shadow:0 0 0 6px rgba(255,180,0,.65);outline:2px solid rgba(255,180,0,1)}}
.btn-s.flash,.btn-p.flash{animation:btn-flash-attn .45s ease-in-out 3}
.modal-backdrop{position:fixed;inset:0;background:rgba(20,20,25,.38);display:none;align-items:center;justify-content:center;z-index:10000;animation:modal-fade .15s ease}
.modal-backdrop.show{display:flex}
.modal-card{background:#fff;border-radius:10px;padding:20px 22px 16px;max-width:380px;width:90%;box-shadow:0 12px 40px rgba(0,0,0,.28);animation:modal-pop .18s ease}
.modal-title{font-size:14px;font-weight:700;color:#111;margin-bottom:14px}
.modal-row{display:flex;gap:10px;margin-bottom:6px;font-size:12px;line-height:1.5}
.modal-row .k{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.6px;min-width:88px;padding-top:3px;font-weight:700}
.modal-row .v{color:#222;flex:1;word-break:break-word}
.modal-note{font-size:10px;color:#888;margin:10px 0 14px;line-height:1.5}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}
.modal-btn{padding:7px 14px;font-size:12px;font-weight:600;border-radius:6px;border:1px solid #ccc;background:#fff;cursor:pointer;color:#555}
.modal-btn:hover{background:#f5f5f5}
.modal-btn.primary{background:#1e6fff;color:#fff;border-color:#1e6fff}
.modal-btn.primary:hover{background:#1858cc}
@keyframes modal-fade{from{opacity:0}to{opacity:1}}
@keyframes modal-pop{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.osm-controls{position:absolute;top:40px;left:60px;z-index:1000;display:flex;gap:4px}
.osm-btn{font-size:11px;font-weight:600;padding:4px 8px;border-radius:12px;background:rgba(255,255,255,.92);border:1px solid #aaa;color:#333;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.osm-btn:hover{background:#eef6ff}
.osm-btn.off{color:#999;border-color:#ccc;background:rgba(240,240,240,.9)}
.osm-btn.primary{border-color:#1e6fff;color:#1e6fff}
.sidebar{background:#fff;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;font-size:12px}
.field label{display:block;font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.field input{width:100%;padding:5px 7px;border:1px solid #ddd;border-radius:4px;font-size:12px}
.field input:focus{outline:none;border-color:#888}
.braille-box{background:#f8f8f8;border:1px solid #ddd;border-radius:6px;padding:10px;text-align:center}
.braille-box .dots{font-size:30px;color:#111;letter-spacing:5px;margin:4px 0}
.braille-box .meta{font-size:9px;color:#888}
.info{font-size:11px;color:#888;line-height:1.5}.info b{color:#555}
.empty{text-align:center;padding:30px 0;color:#bbb;font-size:11px}
.legend{font-size:11px;flex:1;overflow-y:auto}
.legend table{width:100%;border-collapse:collapse}
.legend th{text-align:left;font-size:9px;color:#888;text-transform:uppercase;padding:3px 0;border-bottom:1px solid #eee}
.legend td{padding:2px 0;border-bottom:1px solid #f5f5f5;cursor:pointer}
.legend tr:hover td{background:#f0f8ff}
.legend tr.active td{background:#fff1c4;font-weight:600;box-shadow:inset 3px 0 0 #f0a500}
.legend .bc{font-size:13px;color:#111}
.status{font-size:10px;color:#888;padding:4px 0;border-top:1px solid #eee;text-align:center}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1>Braille Editor 3D</h1>
  <button class="btn-s" id="btn-load">Load STL</button>
  <input type="file" id="file-input" accept=".stl">
  <button class="btn-s" id="btn-topview" style="background:#2a6e3f;color:#fff">Top View</button>
  <button class="btn-s" id="btn-place" style="background:#8b5e00;color:#fff">+ Free Label</button>
  <button class="btn-s" id="btn-review" style="background:#555;color:#fff" title="Review: base turns translucent, braille dots glow gold">Review</button>
  <span class="hint" id="mode-hint">Click a rooftop to select</span>
  <div class="spacer"></div>
  <button class="btn-s" id="btn-clear-all" style="background:#7a2f2f;color:#fff" title="Remove every braille label from this STL">Clear All</button>
  <button class="btn-s" id="btn-import">Import Labels</button>
  <button class="btn-p" id="btn-export" title="Download JSON + legend + map content together">Export</button>
  <button class="btn-p" id="btn-download-stl" style="background:#2a8f4f">Download Merged STL</button>
</div>
<div class="mid">
<div id="canvas-container">
  <div id="info-overlay">Drag to rotate, scroll to zoom, right-drag to pan</div>
</div>
<div class="v-resizer" id="v-resizer"></div>
<div id="map-container">
  <div id="leaflet-map"></div>
  <div id="osm-status" class="osm-status" title="OSM cache"><span class="dot"></span></div>
  <div class="osm-controls">
    <button id="osm-fetch-now" class="osm-btn primary" title="Fetch OSM buildings for the current view">&#8635; Fetch this view</button>
  </div>
  <div id="map-suggest" class="map-suggest"></div>
  <div class="map-search">
    <input id="map-search-input" type="text" placeholder="Search...">
    <button id="map-search-btn">Go</button>
  </div>
</div>
</div>
<div class="sidebar">
  <div id="block-detail"><div class="empty">Load an STL file, then click a building surface</div></div>
  <hr style="border:0;border-top:1px solid #eee">
  <div class="legend" id="legend"></div>
  <div class="status" id="status">No STL loaded</div>
</div>
</div>

<div id="confirm-modal" class="modal-backdrop">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-title" id="modal-title">Replace OSM link?</div>
    <div class="modal-row"><span class="k">Currently</span><span class="v" id="modal-current"></span></div>
    <div class="modal-row"><span class="k">Replace with</span><span class="v" id="modal-new"></span></div>
    <div class="modal-note">OK overwrites the name, description, braille code and GPS. Cancel keeps the existing label.</div>
    <div class="modal-actions">
      <button id="modal-cancel" class="modal-btn">Cancel</button>
      <button id="modal-ok" class="modal-btn primary">Replace</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { STLExporter } from 'three/addons/exporters/STLExporter.js';

// ---- Braille ----
// UEB dot positions (1-6) per character. Digits 1-0 share patterns with A-J
// — disambiguation is handled by a leading number indicator cell ⠼ (dots
// 3,4,5,6), emitted by codeToBrailleCells() below, NOT by storing separate
// glyphs. This mirrors the UEB spec and is what an embosser expects.
const UEB_DOTS = {
  A:[1],B:[1,2],C:[1,4],D:[1,4,5],E:[1,5],F:[1,2,4],G:[1,2,4,5],H:[1,2,5],I:[2,4],J:[2,4,5],
  K:[1,3],L:[1,2,3],M:[1,3,4],N:[1,3,4,5],O:[1,3,5],P:[1,2,3,4],Q:[1,2,3,4,5],R:[1,2,3,5],
  S:[2,3,4],T:[2,3,4,5],U:[1,3,6],V:[1,2,3,6],W:[2,4,5,6],X:[1,3,4,6],Y:[1,3,4,5,6],Z:[1,3,5,6],
  '1':[1],'2':[1,2],'3':[1,4],'4':[1,4,5],'5':[1,5],
  '6':[1,2,4],'7':[1,2,4,5],'8':[1,2,5],'9':[2,4],'0':[2,4,5],
};
const NUM_INDICATOR_DOTS = [3, 4, 5, 6];      // ⠼ "what follows is a number"
const LETTER_INDICATOR_DOTS = [5, 6];         // ⠰ "back to letters" after digits
const DIGIT_LOOKALIKES = 'ABCDEFGHIJ';        // letters that collide with digits

// Lowered (Nemeth-style) digit patterns: A-J shifted from rows 1,2 to rows
// 2,3. These share no cell shape with any A-Z letter, so no number indicator
// is needed — saving one cell per digit run. Trade-off: not strict UEB.
// Opt-in per label (region.compactDigits = true) for tight rooftops.
const LOWER_DIGIT_DOTS = {
  '1':[2],'2':[2,3],'3':[2,5],'4':[2,5,6],'5':[2,6],
  '6':[2,3,5],'7':[2,3,5,6],'8':[2,3,6],'9':[3,5],'0':[3,5,6],
};

// Convert dot-list → Unicode braille cell (U+2800 + bit mask on dots 1..6).
function dotsToUnicode(dots) {
  let mask = 0;
  for (const d of (dots || [])) mask |= (1 << (d - 1));
  return String.fromCharCode(0x2800 + mask);
}

// Convert a code string to an ordered list of physical braille cells.
// Two modes:
//   (default) Standard UEB: digits use A-J patterns prefixed by ⠼ indicator;
//     letter indicator ⠰ separates digit runs from trailing a-j letters.
//       "S5"  → [S, ⠼, 5]           (3 cells)
//       "A5B" → [A, ⠼, 5, ⠰, B]     (5 cells)
//   (options.compactDigits = true) Lowered digits: each digit is 1 cell,
//     no indicators needed because lowered patterns don't collide with A-Z.
//     Not strict UEB but saves space on tight rooftops.
//       "S5"  → [S, 5-lower]        (2 cells)
//       "A5B" → [A, 5-lower, B]     (3 cells)
function codeToBrailleCells(code, options) {
  const compact = !!(options && options.compactDigits);
  const cells = [];
  let inNum = false;
  for (const rawCh of (code || '').toUpperCase()) {
    if (rawCh === ' ') {
      inNum = false;
      cells.push({ dots: [], kind: 'space', char: ' ' });
      continue;
    }
    const isDigit = rawCh >= '0' && rawCh <= '9';
    if (compact && isDigit) {
      // Compact mode: skip indicator, use lowered-digit dots directly.
      cells.push({ dots: LOWER_DIGIT_DOTS[rawCh] || [], kind: 'lowerDigit', char: rawCh });
      continue;
    }
    if (isDigit && !inNum) {
      cells.push({ dots: NUM_INDICATOR_DOTS, kind: 'numSign', char: '⠼' });
      inNum = true;
    } else if (!isDigit && inNum) {
      inNum = false;
      if (DIGIT_LOOKALIKES.includes(rawCh)) {
        cells.push({ dots: LETTER_INDICATOR_DOTS, kind: 'letterSign', char: '⠰' });
      }
    }
    cells.push({ dots: UEB_DOTS[rawCh] || [], kind: 'char', char: rawCh });
  }
  return cells;
}

function codeCellCount(code, options) { return codeToBrailleCells(code, options).length; }

function toBraille(code, options) {
  return codeToBrailleCells(code, options).map(c =>
    c.kind === 'space' ? '⠀' : dotsToUnicode(c.dots)).join('');
}

// Ordered abbreviation rules ported from annotate_v2.py SMART_ABBREVS.
// Longer/compound patterns precede shorter ones.
const SMART_ABBREVS = [
  [/advanced technology center/i, 'ATC'],
  [/campus center/i, 'CC'],
  [/history center/i, 'CHC'],
  [/learning center/i, 'LC'],
  [/multicultural center/i, 'MCC'],
  [/student services/i, 'SS'],
  [/visual and performing arts/i, 'VPA'],
  [/library/i, 'LIB'],
  [/administration/i, 'ADM'],
  [/bookstore/i, 'BKS'],
  [/planetarium/i, 'PLN'],
  [/fitness/i, 'FIT'],
  [/gymnasium|\bgym\b/i, 'GYM'],
  [/forum/i, 'FRM'],
  [/\bgarage\b/i, 'GAR'],
  [/parking/i, 'PKG'],
  [/station/i, 'STN'],
  [/theatre|theater/i, 'THR'],
  [/museum/i, 'MUS'],
  [/hotel/i, 'HTL'],
  [/\bpool\b/i, 'POL'],
  [/^building\s+([a-z]{1,2}\d{0,2})\b/i, null],
];
const INITIAL_STOPWORDS = new Set([
  'the','of','and','a','an','&',
  'san','francisco',
  'hotel','building','center','square','de','anza','college',
]);
function makeCode(name, maxLen = 3) {
  if (!name) return '';
  for (const [pattern, code] of SMART_ABBREVS) {
    const m = name.match(pattern);
    if (m) {
      if (code) return code;
      if (m[1]) return m[1].toUpperCase().slice(0, maxLen);
    }
  }
  const words = name.split(/[\s/]+/)
    .map(w => w.replace(/[^A-Za-z0-9]/g, ''))
    .filter(w => w && !INITIAL_STOPWORDS.has(w.toLowerCase()));
  const initials = words.map(w => w[0]).join('').toUpperCase();
  return initials.slice(0, maxLen)
    || name.replace(/[^A-Za-z0-9]/g, '').slice(0, maxLen).toUpperCase();
}

// Braille physical parameters (mm)
const DOT_R = 0.8, DOT_H = 0.8, DOT_SP = 2.5, CELL_GAP = 6.0;

// Merge-time base slab: required solid material below the lowest sphere point
const BRAILLE_BASE_SAFETY_MM = 1.0;

// Global UID allocator (format: a1, a2, ...). Prefix fixed per spec.
const UID_PREFIX = 'a';
let uidCounter = 0;
function allocUid() { uidCounter += 1; return UID_PREFIX + uidCounter; }
function noteExistingUid(uid) {
  if (typeof uid !== 'string') return;
  const m = uid.match(/^a(\d+)$/);
  if (m) uidCounter = Math.max(uidCounter, parseInt(m[1], 10));
}
function ensureUid(region) {
  if (!region.uid) region.uid = allocUid();
  return region.uid;
}

// Review mode toggles a translucent map base + glowing gold braille dots so
// the user can visually audit what's been annotated without the surface
// clutter. Two shared materials so every braille mesh animates together.
const MAT_BRAILLE_DEFAULT = new THREE.MeshPhongMaterial({ color: 0xffffff });
const MAT_BRAILLE_REVIEW = new THREE.MeshPhongMaterial({
  color: 0xffd700,
  emissive: 0xffaa00,
  emissiveIntensity: 0.75,
  shininess: 120,
});
const MAT_BRAILLE_ISSUE = new THREE.MeshPhongMaterial({
  color: 0xff4040,
  emissive: 0xcc1010,
  emissiveIntensity: 0.85,
  shininess: 100,
});
let reviewMode = false;
function brailleMaterial() { return reviewMode ? MAT_BRAILLE_REVIEW : MAT_BRAILLE_DEFAULT; }

function createBrailleMesh(code, cx, cy, z, rotation = 0, scale = 1.0, options = {}) {
  const s = scale;
  const dotR = DOT_R * s, dotH = DOT_H * s, dotSp = DOT_SP * s, cellGap = CELL_GAP * s;

  // Expand the code into physical cells. Compact mode uses lowered digits
  // (1 cell each, no indicator); standard mode is strict UEB.
  const cells = codeToBrailleCells(code, options);
  const offsets = [];
  let cellX = 0;
  for (const cell of cells) {
    for (const d of cell.dots) {
      const row = (d - 1) % 3, col = (d - 1) >= 3 ? 1 : 0;
      offsets.push([cellX + col * dotSp, -row * dotSp]);
    }
    cellX += cellGap;
  }
  const cellCount = cells.length;
  const labelW = (cellCount - 1) * cellGap + dotSp;
  const labelH = 2 * dotSp;

  const group = new THREE.Group();
  const mat = brailleMaterial();
  for (const [dx, dy] of offsets) {
    let lx = dx - labelW / 2;
    let ly = dy + labelH / 2;
    if (rotation) {
      const rad = rotation * Math.PI / 180;
      const cos = Math.cos(rad), sin = Math.sin(rad);
      const rx = lx * cos - ly * sin;
      const ry = lx * sin + ly * cos;
      lx = rx; ly = ry;
    }
    // Braille dot = hemisphere dome + flat disc cap (watertight). With
    // DOT_H == DOT_R a hemisphere IS the full dot, no cylinder stem needed.
    // The tiny embed avoids coincident-plane slicer issues; 0.02mm is below
    // any realistic rooftop thickness so the dot never pierces the mesh.
    const embed = 0.02 * s;
    const baseZ = z - embed;
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(dotR, 12, 6, 0, Math.PI * 2, 0, Math.PI / 2), mat);
    sphere.rotation.x = Math.PI / 2;
    sphere.position.set(cx + lx, cy + ly, baseZ);
    group.add(sphere);
    // Flat disc closes the hemisphere's open bottom, normal facing down.
    const disc = new THREE.Mesh(new THREE.CircleGeometry(dotR, 12), mat);
    disc.rotation.x = Math.PI;
    disc.position.set(cx + lx, cy + ly, baseZ);
    group.add(disc);
  }
  group.userData = { code, rotation, scale };
  return group;
}

// Track braille meshes per region
const brailleMeshes = new Map(); // regionId -> THREE.Group

function updateBrailleMesh(region) {
  if (brailleMeshes.has(region.id)) {
    scene.remove(brailleMeshes.get(region.id));
    brailleMeshes.delete(region.id);
  }
  if (!region.code) return;
  const mesh = createBrailleMesh(
    region.code, region.cx, region.cy, region.z,
    region.rotation || 0, region.scale || 1.0,
    { compactDigits: region.compactDigits === true });
  scene.add(mesh);
  brailleMeshes.set(region.id, mesh);
  // If review mode is on, re-run issue detection so colors stay accurate
  // when the user drags a dot or edits a code.
  if (reviewMode && typeof refreshReviewColors === 'function') refreshReviewColors();
}

// Re-apply gold vs red colors in review mode. Defined up here so
// updateBrailleMesh can call it before the button handler has loaded.
function refreshReviewColors() {
  if (!reviewMode) return;
  const issues = detectLabelIssues();
  lastReviewIssues = issues;
  for (const [rid, grp] of brailleMeshes) {
    const mat = issues.has(rid) ? MAT_BRAILLE_ISSUE : MAT_BRAILLE_REVIEW;
    grp.children.forEach(c => { c.material = mat; });
  }
}

// ---- Three.js setup ----
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x2a2a2a);
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
camera.position.set(100, 100, 250);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(100, 200, 150);
scene.add(dirLight);

function resize() {

// ---- STL loading and region detection ----
let stlMesh = null;
let regions = [];       // array of { faceIndices, center, z, area, bbox, name, code, description }
let selectedRegion = null;
let regionColors = null; // per-face color buffer
let stlFileName = '';

const BASE_COLOR = new THREE.Color(0.85, 0.85, 0.85);
const HOVER_COLOR = new THREE.Color(0.7, 0.85, 1.0);
const SELECTED_COLOR = new THREE.Color(1.0, 0.92, 0.5);
const LABELED_COLOR = new THREE.Color(0.7, 0.95, 0.7);

// Wipe every piece of annotation state. Called on STL load so a new file
// never inherits labels/dots/cache from the previous one, and also by the
// "Clear all" toolbar button to reset the current session without reloading.
function clearAllAnnotations({ keepRegions = false } = {}) {
  // Remove every physical braille mesh from the 3D scene.
  for (const [, grp] of brailleMeshes) scene.remove(grp);
  brailleMeshes.clear();
  // Drop free labels entirely. Region labels are wiped in-place so the
  // rooftops stay selectable (only their name/code/osm fields get cleared).
  freeLabels = [];
  if (keepRegions) {
    for (const r of regions) {
      if (r.isFree) continue;
      r.name = ''; r.code = ''; r.description = '';
      r.rotation = 0; r.scale = 1.0;
      r.osm = null; r.compactDigits = false;
      delete r.uid;
    }
    regions = regions.filter(r => !r.isFree);
  } else {
    regions = [];
  }
  selectedRegion = null;
  pendingOsmMatch = null;
  lastReviewIssues = null;
  if (typeof osmMarker !== 'undefined' && osmMarker && leafletMap) {
    leafletMap.removeLayer(osmMarker);
    osmMarker = null;
  }
  uidCounter = 0;
}

function loadSTL(buffer, fileName) {
  // A fresh STL means a fresh session — throw out every dot, free label,
  // and selection from any previous load.
  clearAllAnnotations({ keepRegions: false });

  stlFileName = fileName;
  // Remove old mesh
  if (stlMesh) scene.remove(stlMesh);

  const loader = new STLLoader();
  const geometry = loader.parse(buffer);
  geometry.computeVertexNormals();

  // Center the geometry
  geometry.computeBoundingBox();
  const box = geometry.boundingBox;
  const cx = (box.max.x + box.min.x) / 2;
  const cy = (box.max.y + box.min.y) / 2;
  geometry.translate(-cx, -cy, 0);

  // Per-face colors
  const faceCount = geometry.attributes.position.count / 3;
  const colors = new Float32Array(faceCount * 3 * 3);
  for (let i = 0; i < faceCount * 3; i++) {
    colors[i * 3] = BASE_COLOR.r;
    colors[i * 3 + 1] = BASE_COLOR.g;
    colors[i * 3 + 2] = BASE_COLOR.b;
  }
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const material = new THREE.MeshPhongMaterial({
    vertexColors: true, flatShading: true,
    side: THREE.DoubleSide,
  });
  stlMesh = new THREE.Mesh(geometry, material);
  scene.add(stlMesh);

  // Fit camera
  const size = box.max.clone().sub(box.min);
  const maxDim = Math.max(size.x, size.y, size.z);
  camera.position.set(0, -maxDim * 0.3, maxDim * 1.2);
  controls.target.set(0, 0, size.z / 2);
  controls.update();

  // Detect regions (connected top-faces)
  detectRegions(geometry);
  updateStatus();
  renderLegend();
  renderDetail();

  // Auto-navigate the map to match the STL location. The filename is the only
  // hint we have (STL files carry no GPS metadata), so we reverse the filename
  // to a search query: "Union Square_SF.stl" -> "Union Square SF".
  autoNavigateFromFilename(fileName);
}

function autoNavigateFromFilename(filename) {
  if (!filename) return;
  const q = filename.replace(/\.stl$/i, '').replace(/[_/\-]+/g, ' ').trim();
  if (q.length < 3) return;
  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`)
    .then(r => r.json()).then(res => {
      if (res && res.length) {
        leafletMap.setView([+res[0].lat, +res[0].lon], 18);
      }
    }).catch(() => {});
}

function detectRegions(geometry) {
  const pos = geometry.attributes.position;
  const nor = geometry.attributes.normal;
  const faceCount = pos.count / 3;

  // Build face data: center position for each face
  const faces = [];
  for (let i = 0; i < faceCount; i++) {
    const i3 = i * 3;
    const cx = (pos.getX(i3) + pos.getX(i3+1) + pos.getX(i3+2)) / 3;
    const cy = (pos.getY(i3) + pos.getY(i3+1) + pos.getY(i3+2)) / 3;
    const cz = (pos.getZ(i3) + pos.getZ(i3+1) + pos.getZ(i3+2)) / 3;
    faces.push({ cx, cy, cz, regionId: -1 });
  }

  // Build adjacency via shared edges (vertex position hashing)
  const edgeMap = new Map();
  function vkey(x, y, z) {
    return `${Math.round(x*50)},${Math.round(y*50)},${Math.round(z*50)}`;
  }
  for (let i = 0; i < faceCount; i++) {
    const i3 = i * 3;
    const verts = [];
    for (let v = 0; v < 3; v++) {
      verts.push(vkey(pos.getX(i3+v), pos.getY(i3+v), pos.getZ(i3+v)));
    }
    for (let e = 0; e < 3; e++) {
      const a = verts[e], b = verts[(e+1)%3];
      const key = a < b ? a+'|'+b : b+'|'+a;
      if (!edgeMap.has(key)) edgeMap.set(key, []);
      edgeMap.get(key).push(i);
    }
  }
  const neighbors = Array.from({length: faceCount}, () => []);
  for (const faceList of edgeMap.values()) {
    for (let i = 0; i < faceList.length; i++) {
      for (let j = i+1; j < faceList.length; j++) {
        neighbors[faceList[i]].push(faceList[j]);
        neighbors[faceList[j]].push(faceList[i]);
      }
    }
  }

  // Height-discontinuity segmentation:
  // Two adjacent faces belong to the same region ONLY if their
  // z-height difference is small. Height jumps = boundaries.
  const Z_TOL = 0.5;
  regions = [];
  let regionId = 0;
  for (let i = 0; i < faceCount; i++) {
    if (faces[i].regionId >= 0) continue;
    const z0 = faces[i].cz;
    const queue = [i];
    const region = [];
    while (queue.length > 0) {
      const fi = queue.pop();
      if (faces[fi].regionId >= 0) continue;
      if (Math.abs(faces[fi].cz - z0) > Z_TOL) continue;
      faces[fi].regionId = regionId;
      region.push(fi);
      for (const ni of neighbors[fi]) {
        if (faces[ni].regionId < 0 && Math.abs(faces[ni].cz - z0) <= Z_TOL) {
          queue.push(ni);
        }
      }
    }
    if (region.length >= 2) {
      let sumX=0, sumY=0, sumZ=0;
      let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
      for (const fi of region) {
        sumX += faces[fi].cx; sumY += faces[fi].cy; sumZ += faces[fi].cz;
        minX = Math.min(minX, faces[fi].cx); maxX = Math.max(maxX, faces[fi].cx);
        minY = Math.min(minY, faces[fi].cy); maxY = Math.max(maxY, faces[fi].cy);
      }
      const n = region.length;
      regions.push({
        id: regionId + 1,
        faceIndices: region,
        cx: sumX/n, cy: sumY/n, z: sumZ/n,
        w: maxX - minX, h: maxY - minY,
        area: n,
        name: '', code: '', description: '',
        osm: null,
      });
    }
    regionId++;
  }
  regions.sort((a, b) => b.area - a.area);
  regions.forEach((r, i) => r.id = i + 1);

  // Flag all map-base / ground regions so "on map base" review checks fire
  // and click-selection ignores them. Z-based: anything within 0.5mm of the
  // lowest region z, with at least 5% of total area (filters mesh noise). This
  // is more robust than an area-ratio heuristic on dense downtowns where many
  // large rooftops dilute the base's relative share.
  if (regions.length >= 2) {
    const minZ = Math.min(...regions.map(r => r.z));
    const total = regions.reduce((s, r) => s + r.area, 0);
    for (const r of regions) {
      if (r.z <= minZ + 0.5 && r.area / total >= 0.05) {
        r.isBackground = true;
      }
    }
  }

  console.log(`Detected ${regions.length} surface regions`);
}

// ---- Raycasting and selection ----
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getRegionAtFace(faceIndex) {
  return regions.find(r => r.faceIndices.includes(faceIndex));
}

function highlightRegion(region, color) {
  if (!stlMesh || !region) return;
  const colors = stlMesh.geometry.attributes.color;
  for (const fi of region.faceIndices) {
    const i3 = fi * 3;
    for (let v = 0; v < 3; v++) {
      colors.setXYZ(i3 + v, color.r, color.g, color.b);
    }
  }
  colors.needsUpdate = true;
}

function resetAllColors() {
  if (!stlMesh) return;
  const colors = stlMesh.geometry.attributes.color;
  const count = colors.count;
  for (let i = 0; i < count; i++) {
    colors.setXYZ(i, BASE_COLOR.r, BASE_COLOR.g, BASE_COLOR.b);
  }
  // Re-apply labeled regions
  for (const r of regions) {
    if (r.code) highlightRegion(r, LABELED_COLOR);
  }
  // Re-apply selected
  if (selectedRegion) highlightRegion(selectedRegion, SELECTED_COLOR);
  colors.needsUpdate = true;
}

let isDragging = false;
let mouseDownPos = { x: 0, y: 0 };
let movingLabel = null;  // region being dragged

renderer.domElement.addEventListener('mousedown', e => {
  mouseDownPos = { x: e.clientX, y: e.clientY };
  isDragging = false;

  // Check if clicking on an existing braille label mesh
  if (!stlMesh || placementMode) return;
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Test braille meshes first
  const brailleObjects = [];
  for (const [rid, grp] of brailleMeshes) {
    grp.children.forEach(c => { c.userData._rid = rid; brailleObjects.push(c); });
  }
  const bHits = raycaster.intersectObjects(brailleObjects);
  if (bHits.length > 0) {
    const rid = bHits[0].object.userData._rid;
    const region = regions.find(r => r.id === rid);
    if (region) {
      movingLabel = region;
      selectedRegion = region;
      controls.enabled = false; // disable orbit while dragging
      renderer.domElement.style.cursor = 'move';
      resetAllColors();
      if (region.faceIndices && region.faceIndices.length) highlightRegion(region, SELECTED_COLOR);
      renderDetail();
    }
  }
});

renderer.domElement.addEventListener('mousemove', e => {
  const dx = e.clientX - mouseDownPos.x;
  const dy = e.clientY - mouseDownPos.y;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;

  // Drag label: move it along the surface, snap to highest z
  if (movingLabel && isDragging) {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObject(stlMesh);
    if (hits.length > 0) {
      // Use the hit x,y but find the TOP surface z by casting a ray downward
      const p = hits[0].point;
      const topRay = new THREE.Raycaster(
        new THREE.Vector3(p.x, p.y, 20), new THREE.Vector3(0, 0, -1));
      const topHits = topRay.intersectObject(stlMesh);
      const topZ = topHits.length > 0 ? topHits[0].point.z : p.z;
      movingLabel.cx = p.x;
      movingLabel.cy = p.y;
      movingLabel.z = topZ;  // always snap to top surface
      updateBrailleMesh(movingLabel);
    }
  }
});

// Detect label issues: pierces the map base, overlaps another label, or
// floats with no surface directly beneath it. Used by Review mode to paint
// problem dots red instead of gold so they're easy to spot and fix.
function labelWidthMm(r) {
  const s = r.scale || 1.0;
  const len = codeCellCount(r.code || '', { compactDigits: r.compactDigits === true });
  if (!len) return 0;
  return (len - 1) * CELL_GAP * s + DOT_SP * s + DOT_R * 2 * s;
}
function labelHeightMm(r) {
  const s = r.scale || 1.0;
  return DOT_SP * 2 * s + DOT_R * 2 * s;
}

function detectLabelIssues() {
  const issues = new Map(); // region.id -> array of issue strings
  if (!stlMesh) return issues;
  const add = (rid, msg) => {
    if (!issues.has(rid)) issues.set(rid, []);
    issues.get(rid).push(msg);
  };
  const labeled = regions.filter(r => r.code);

  // 1. Pierce: dot geometry extends below the STL's floor plane.
  stlMesh.geometry.computeBoundingBox();
  const floorZ = stlMesh.geometry.boundingBox.min.z;
  for (const r of labeled) {
    const grp = brailleMeshes.get(r.id);
    if (!grp) continue;
    const box = new THREE.Box3().setFromObject(grp);
    if (isFinite(box.min.z) && box.min.z < floorZ - 0.01) {
      add(r.id, `pierces base (${(floorZ - box.min.z).toFixed(2)}mm below)`);
    }
  }

  // 2. Overlap: two label rectangles share XY footprint.
  for (let i = 0; i < labeled.length; i++) {
    for (let j = i + 1; j < labeled.length; j++) {
      const a = labeled[i], b = labeled[j];
      const aw = labelWidthMm(a), ah = labelHeightMm(a);
      const bw = labelWidthMm(b), bh = labelHeightMm(b);
      if (Math.abs(a.cx - b.cx) < (aw + bw) / 2
          && Math.abs(a.cy - b.cy) < (ah + bh) / 2) {
        add(a.id, `overlaps #${b.id}`);
        add(b.id, `overlaps #${a.id}`);
      }
    }
  }

  // 3. Ray-based placement checks. We check the label center AND the four
  // corners of the label rectangle. If a corner hits a different region
  // (or misses the mesh entirely), part of the label is extending off its
  // intended rooftop — flag it so the author can resize / reposition.
  const downRay = new THREE.Raycaster();
  const upRay = new THREE.Raycaster();
  const DOWN = new THREE.Vector3(0, 0, -1);
  const UP = new THREE.Vector3(0, 0, 1);

  function castDown(x, y, startZ) {
    downRay.set(new THREE.Vector3(x, y, startZ), DOWN);
    return downRay.intersectObject(stlMesh);
  }

  for (const r of labeled) {
    // --- center checks ---
    const centerHits = castDown(r.cx, r.cy, r.z + 0.5);
    let centerRegion = null;
    if (!centerHits.length) {
      add(r.id, 'floating (no surface below)');
    } else {
      const gap = r.z - centerHits[0].point.z;
      if (gap > 2.0) add(r.id, `floating (${gap.toFixed(1)}mm above surface)`);
      centerRegion = getRegionAtFace(centerHits[0].faceIndex);
      if (centerRegion && centerRegion.isBackground) {
        add(r.id, 'on map base (no building underneath)');
      }
    }

    // --- buried check ---
    upRay.set(new THREE.Vector3(r.cx, r.cy, r.z + 0.05), UP);
    const upHits = upRay.intersectObject(stlMesh);
    if (upHits.length) {
      const above = upHits[0].point.z - r.z;
      add(r.id, `buried under surface (${above.toFixed(1)}mm above)`);
    }

    // --- cross-region check: probe corners AND edge midpoints of the label
    // rectangle. If any sampled point lands on a different region than the
    // center (different rooftop, different building, or background), the
    // label is straddling a boundary and should be flagged. 8 samples + the
    // center is enough to catch edge crossings we'd miss with 4 corners only.
    const hw = labelWidthMm(r) / 2, hh = labelHeightMm(r) / 2;
    if (hw > 0 && hh > 0) {
      const rot = ((r.rotation || 0) * Math.PI) / 180;
      const cos = Math.cos(rot), sin = Math.sin(rot);
      const samples = [
        [-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh],        // corners
        [0,-hh],[hw,0],[0,hh],[-hw,0],              // edge midpoints
      ];
      const regionIds = new Set();
      if (centerRegion) regionIds.add(centerRegion.id);
      let offMesh = false;
      for (const [lx, ly] of samples) {
        const x = r.cx + lx * cos - ly * sin;
        const y = r.cy + lx * sin + ly * cos;
        const hs = castDown(x, y, r.z + 0.5);
        if (!hs.length) { offMesh = true; continue; }
        const reg = getRegionAtFace(hs[0].faceIndex);
        if (reg) regionIds.add(reg.id);
      }
      if (offMesh) add(r.id, 'extends off map edge');
      if (regionIds.size > 1) {
        add(r.id, `spans ${regionIds.size} regions`);
      }
    }
  }

  return issues;
}

// Review mode: translucent base + glowing braille dots. Good dots glow gold;
// dots with issues (pierce / overlap / float) glow red so user can fix them.
const reviewBtn = document.getElementById('btn-review');
let lastReviewIssues = null;
reviewBtn.addEventListener('click', () => {
  reviewMode = !reviewMode;
  reviewBtn.style.background = reviewMode ? '#ffb400' : '#555';
  reviewBtn.style.color = reviewMode ? '#222' : '#fff';
  reviewBtn.textContent = reviewMode ? 'Review: ON' : 'Review';
  if (stlMesh) {
    const m = stlMesh.material;
    m.transparent = reviewMode;
    m.opacity = reviewMode ? 0.25 : 1.0;
    m.depthWrite = !reviewMode;
    m.needsUpdate = true;
  }
  if (reviewMode) {
    const issues = detectLabelIssues();
    lastReviewIssues = issues;
    for (const [rid, grp] of brailleMeshes) {
      const mat = issues.has(rid) ? MAT_BRAILLE_ISSUE : MAT_BRAILLE_REVIEW;
      grp.children.forEach(c => { c.material = mat; });
    }
    const issueCount = issues.size;
    const total = regions.filter(r => r.code).length;
    const statusEl = document.getElementById('status');
    if (issueCount > 0) {
      statusEl.textContent = `Review: ${issueCount} issue${issueCount === 1 ? '' : 's'} of ${total} labels (red dots)`;
      statusEl.style.color = '#c0392b';
    } else {
      statusEl.textContent = `Review: all ${total} labels OK`;
      statusEl.style.color = '#2e7d32';
    }
  } else {
    lastReviewIssues = null;
    for (const [, grp] of brailleMeshes) {
      grp.children.forEach(c => { c.material = MAT_BRAILLE_DEFAULT; });
    }
    document.getElementById('status').style.color = '';
    updateStatus();
  }
});

renderer.domElement.addEventListener('click', e => {
  if (isDragging) return;

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  if (!stlMesh) return;
  const hits = raycaster.intersectObject(stlMesh);
  if (hits.length === 0) {
    if (!placementMode) {
      selectedRegion = null;
      resetAllColors();
      renderDetail();
    }
    return;
  }

  const hit = hits[0];
  const faceIndex = hit.faceIndex;

  // Placement mode: place a free label, snap to top surface
  if (placementMode) {
    const p = hit.point;
    // Cast ray downward from above to get the top surface z
    const topRay = new THREE.Raycaster(
      new THREE.Vector3(p.x, p.y, 20), new THREE.Vector3(0, 0, -1));
    const topHits = topRay.intersectObject(stlMesh);
    const topZ = topHits.length > 0 ? topHits[0].point.z : p.z;
    const freeLabel = {
      id: nextFreeId++,
      isFree: true,
      faceIndices: [],
      cx: p.x, cy: p.y, z: topZ,
      w: 0, h: 0, area: 0,
      name: '', code: '', description: '',
      rotation: 0, scale: 1.0,
      osm: null,
    };
    freeLabels.push(freeLabel);
    regions.push(freeLabel);
    selectedRegion = freeLabel;
    // Reverse-flow attach: if a map building is waiting, bind it to this free label.
    consumePendingOsmMatch(freeLabel);
    resetAllColors();
    renderDetail();
    // Exit placement mode
    placementMode = false;
    document.getElementById('btn-place').style.background = '#8b5e00';
    document.getElementById('btn-place').textContent = '+ Free Label';
    document.getElementById('mode-hint').textContent = 'Click a rooftop to select';
    renderer.domElement.style.cursor = 'default';
    return;
  }

  // Check if clicking on braille dots (select that label)
  const brailleObjects = [];
  for (const [rid, grp] of brailleMeshes) {
    grp.children.forEach(c => { c.userData._rid = rid; brailleObjects.push(c); });
  }
  const bHits = raycaster.intersectObjects(brailleObjects);
  if (bHits.length > 0) {
    const rid = bHits[0].object.userData._rid;
    const labelRegion = regions.find(r => r.id === rid);
    if (labelRegion) {
      selectedRegion = labelRegion;
      resetAllColors();
      if (labelRegion.faceIndices && labelRegion.faceIndices.length) highlightRegion(labelRegion, SELECTED_COLOR);
      renderDetail();
      return;
    }
  }

  // Normal click: select a region by its surface face
  const region = getRegionAtFace(faceIndex);
  if (region) {
    // Skip the giant ground plane / background — clicking there is almost
    // always a misfire and selecting it wastes screen state.
    if (region.isBackground) {
      setModeHint('Map base clicked. Use + Free Label for open ground, or pick a rooftop', '#c0392b');
      const freeBtn = document.getElementById('btn-place');
      freeBtn.classList.remove('flash');
      void freeBtn.offsetWidth; // restart CSS animation if already flashed
      freeBtn.classList.add('flash');
      setTimeout(() => freeBtn.classList.remove('flash'), 1600);
      setTimeout(() => setModeHint('Click a rooftop to select'), 3000);
      return;
    }
    selectedRegion = region;
    // Reverse-flow attach: if a map building is waiting, bind it here.
    if (consumePendingOsmMatch(region)) return;
    resetAllColors();
    highlightRegion(region, SELECTED_COLOR);
    renderDetail();
  }
});

// Keyboard shortcuts for the 3D view. Ignored while typing in inputs /
// textareas and while the confirm modal is open so they don't steal keys.
document.addEventListener('keydown', (e) => {
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (document.getElementById('confirm-modal').classList.contains('show')) return;

  // Esc: clear selection + any pending map-to-rooftop attach.
  if (e.key === 'Escape') {
    let touched = false;
    if (selectedRegion) { selectedRegion = null; touched = true; }
    if (pendingOsmMatch) { pendingOsmMatch = null; touched = true; }
    if (osmMarker) { leafletMap.removeLayer(osmMarker); osmMarker = null; touched = true; }
    if (touched) {
      setModeHint('Click a rooftop to select');
      resetAllColors();
      renderDetail();
      renderLegend();
    }
    return;
  }

  // Delete / Backspace: delete the selected label. For region labels, clears
  // the code/name/OSM. For free labels, removes the label entirely.
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedRegion) {
    e.preventDefault();
    clearLabel();
  }
});

// ---- UI ----
function renderDetail() {
  const el = document.getElementById('block-detail');
  if (!selectedRegion) {
    el.innerHTML = '<div class="empty">Click a building rooftop to select it</div>';
    return;
  }
  const r = selectedRegion;
  const braille = r.code ? toBraille(r.code, { compactDigits: r.compactDigits === true }) : '';
  const isFree = r.isFree;
  const scale = r.scale || 1.0;
  const osm = r.osm;
  const osmCategory = osm && osm.category
    ? ` &nbsp; <span style="background:#eef6ff;color:#1e6fff;padding:1px 5px;border-radius:3px;font-size:10px">${osm.category}${osm.subClass ? ` · ${osm.subClass}` : ''}</span>`
    : '';
  const spatialBits = [];
  if (osm && osm.spatial) {
    if (osm.spatial.position) spatialBits.push(osm.spatial.position);
    if (osm.spatial.edge) spatialBits.push(`touches ${osm.spatial.edge} edge`);
    if (osm.spatial.coveragePct != null) spatialBits.push(`covers ${osm.spatial.coveragePct}% of view`);
  }
  const spatialLine = spatialBits.length
    ? `<br><span style="color:#777;font-size:10px">${spatialBits.join(' · ')}</span>`
    : '';
  const kt = (osm && osm.keyTags) || {};
  const wikiBits = [];
  if (kt.wikipedia) {
    const href = 'https://en.wikipedia.org/wiki/' + encodeURIComponent(kt.wikipedia.replace(/^en:/, ''));
    wikiBits.push(`<a href="${href}" target="_blank" rel="noopener" style="color:#1e6fff">Wikipedia↗</a>`);
  }
  if (kt.wikidata) {
    wikiBits.push(`<a href="https://www.wikidata.org/wiki/${kt.wikidata}" target="_blank" rel="noopener" style="color:#1e6fff">Wikidata↗</a>`);
  }
  if (osm && osm.osm_id && osm.osm_type) {
    wikiBits.push(`<a href="https://www.openstreetmap.org/${osm.osm_type}/${osm.osm_id}" target="_blank" rel="noopener" style="color:#1e6fff">OSM↗</a>`);
  }
  const wikiLine = wikiBits.length
    ? `<br><span style="font-size:10px">${wikiBits.join(' · ')}</span>`
    : '';
  // Review-mode issue list for this region (pierce / overlap / float).
  const myIssues = reviewMode && lastReviewIssues && lastReviewIssues.get(r.id);
  const issueLine = (myIssues && myIssues.length)
    ? `<br><span style="background:#ffe5e0;color:#c0392b;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600">⚠ ${myIssues.join(' · ')}</span>`
    : '';
  const osmLine = osm
    ? `<br><b>OSM:</b> ${osm.name || '(unnamed)'}${osmCategory}<br><b>GPS:</b> ${(+osm.lat).toFixed(6)}, ${(+osm.lon).toFixed(6)}${spatialLine}${wikiLine}${issueLine}`
    : `<br><span style="color:#aaa">No OSM match yet (click a building on the map)</span>${issueLine}`;
  el.innerHTML = `
    <div style="font-weight:600;margin-bottom:6px">${isFree ? 'Free Label' : 'Region'} #${r.id}</div>
    <div class="info">${isFree ? '<b>Free placement</b>' : '<b>Faces:</b> '+r.faceIndices.length+' &nbsp; <b>Size:</b> '+r.w.toFixed(0)+'x'+r.h.toFixed(0)+'mm'}<br>
    <b>Position:</b> (${r.cx.toFixed(1)}, ${r.cy.toFixed(1)}) &nbsp; <b>Z:</b> ${r.z.toFixed(2)}mm${osmLine}</div>
    <div class="field" style="margin-top:8px">
      <label>English Name</label>
      <input id="inp-name" value="${r.name||''}" placeholder="e.g. Administration">
    </div>
    <div class="field">
      <label>Braille Code</label>
      <input id="inp-code" value="${r.code||''}" placeholder="e.g. ADM" style="width:100px;display:inline-block" >
    </div>
    <div class="braille-box">
      <div class="meta">Braille Preview</div>
      <div class="dots">${braille||'...'}</div>
      <div class="meta" id="braille-meta">${r.code ? r.code+' ('+codeCellCount(r.code, { compactDigits: r.compactDigits === true })+' cells)' : ''}</div>
    </div>
    <div class="field" style="margin-top:6px">
      <label style="display:flex;align-items:center;gap:6px;text-transform:none;font-size:10px;color:#555;cursor:pointer">
        <input type="checkbox" id="inp-compact" ${r.compactDigits ? 'checked' : ''} style="margin:0;width:auto">
        <span>Compact digits (lowered, saves a cell; not strict UEB)</span>
      </label>
    </div>
    <div class="field">
      <label>Description (legend)</label>
      <input id="inp-desc" value="${r.description||''}" placeholder="Full name for legend">
    </div>
    <div class="field">
      <label>Rotation: <span id="rot-val">${r.rotation||0}</span>&deg;</label>
      <input id="inp-rot" type="range" min="0" max="360" step="15" value="${r.rotation||0}" style="width:100%">
    </div>
    <div class="field">
      <label>Size: <span id="scale-val">${(scale*100).toFixed(0)}</span>%</label>
      <input id="inp-scale" type="range" min="50" max="200" step="10" value="${(scale*100).toFixed(0)}" style="width:100%">
    </div>
    <button class="btn-p" style="width:100%;padding:7px;font-size:12px;border:none;border-radius:4px;cursor:pointer" id="btn-save-label">Save Label</button>
    <button class="btn-s" style="width:100%;padding:5px;font-size:11px;margin-top:4px;border:none;border-radius:4px;cursor:pointer" id="btn-clear-label">${isFree ? 'Delete Free Label' : 'Clear Label'}</button>
  `;

  document.getElementById('inp-code').addEventListener('input', function() {
    const c = this.value.toUpperCase();
    const sc = selectedRegion ? (selectedRegion.scale||1) : 1;
    const opts = { compactDigits: !!(selectedRegion && selectedRegion.compactDigits) };
    // Physical cell count reflects the current mode (standard UEB or compact
    // lowered digits), so the width estimate matches what will actually print.
    const physCells = codeCellCount(c, opts);
    const widthMm = physCells > 0 ? ((physCells - 1) * CELL_GAP * sc + DOT_SP * sc).toFixed(1) : '0';
    document.querySelector('.braille-box .dots').textContent = c ? toBraille(c, opts) : '...';
    document.getElementById('braille-meta').textContent = c
      ? `${c} (${physCells} cells, ${widthMm}mm wide, dot ${(DOT_R*2*sc).toFixed(1)}mm${opts.compactDigits ? ', compact digits' : ''})`
      : '';
  });
  document.getElementById('inp-rot').addEventListener('input', function() {
    document.getElementById('rot-val').textContent = this.value;
    if (selectedRegion && selectedRegion.code) {
      selectedRegion.rotation = parseInt(this.value);
      updateBrailleMesh(selectedRegion);
    }
  });
  document.getElementById('inp-scale').addEventListener('input', function() {
    document.getElementById('scale-val').textContent = this.value;
    if (selectedRegion && selectedRegion.code) {
      selectedRegion.scale = parseInt(this.value) / 100;
      updateBrailleMesh(selectedRegion);
    }
  });
  const inpCompact = document.getElementById('inp-compact');
  if (inpCompact) {
    inpCompact.addEventListener('change', function() {
      if (!selectedRegion) return;
      selectedRegion.compactDigits = this.checked;
      updateBrailleMesh(selectedRegion);
      // Refresh the inline preview so "cells" count / width reflect the mode.
      const codeEvent = new Event('input');
      document.getElementById('inp-code').dispatchEvent(codeEvent);
      renderLegend();
      autoSave();
    });
  }
  document.getElementById('btn-save-label').addEventListener('click', saveLabel);
  document.getElementById('btn-clear-label').addEventListener('click', clearLabel);
  highlightLegendRow();
}

// Auto-save: persist all labels to server after every change
function autoSave() {
  if (!stlFileName) return;
  const allLabeled = regions.filter(r => r.code);
  const out = {
    stl_file: stlFileName,
    uid_prefix: UID_PREFIX,
    next_uid: uidCounter + 1,
    blocks: allLabeled.map(r => ({
      id: r.id, uid: ensureUid(r),
      cx: +r.cx.toFixed(1), cy: +r.cy.toFixed(1), z: +r.z.toFixed(2),
      w: +(r.w||0).toFixed(1), h: +(r.h||0).toFixed(1),
      x_min: +((r.cx||0) - (r.w||0)/2).toFixed(1),
      x_max: +((r.cx||0) + (r.w||0)/2).toFixed(1),
      y_min: +((r.cy||0) - (r.h||0)/2).toFixed(1),
      y_max: +((r.cy||0) + (r.h||0)/2).toFixed(1),
      area: r.area||0, name: r.name, code: r.code,
      description: r.description,
      braille: toBraille(r.code, { compactDigits: r.compactDigits === true }),
      compactDigits: r.compactDigits === true,
      rotation: r.rotation||0, scale: r.scale||1.0,
      isFree: !!r.isFree,
      osm: r.osm || null,
    })),
  };
  fetch('/save_labels', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(out)
  }).then(() => {
    document.getElementById('status').textContent =
      `${regions.length} regions | ${allLabeled.length} labeled | auto-saved`;
  }).catch(() => {});
}

function saveLabel() {
  if (!selectedRegion) return;
  selectedRegion.name = document.getElementById('inp-name').value;
  selectedRegion.code = document.getElementById('inp-code').value.toUpperCase();
  selectedRegion.description = document.getElementById('inp-desc').value;
  selectedRegion.rotation = parseInt(document.getElementById('inp-rot').value) || 0;
  selectedRegion.scale = parseInt(document.getElementById('inp-scale').value) / 100;
  const compactEl = document.getElementById('inp-compact');
  if (compactEl) selectedRegion.compactDigits = compactEl.checked;
  if (selectedRegion.code) ensureUid(selectedRegion);
  updateBrailleMesh(selectedRegion);
  resetAllColors();
  renderLegend();
  updateStatus();
  autoSave();
}

function clearLabel() {
  if (!selectedRegion) return;
  if (selectedRegion.isFree) {
    updateBrailleMesh(selectedRegion);
    selectedRegion.code = '';
    updateBrailleMesh(selectedRegion);
    regions = regions.filter(r => r.id !== selectedRegion.id);
    freeLabels = freeLabels.filter(r => r.id !== selectedRegion.id);
    selectedRegion = null;
  } else {
    selectedRegion.name = '';
    selectedRegion.code = '';
    selectedRegion.description = '';
    selectedRegion.rotation = 0;
    selectedRegion.scale = 1.0;
    updateBrailleMesh(selectedRegion);
  }
  resetAllColors();
  renderDetail();
  renderLegend();
  updateStatus();
  autoSave();
}

function renderLegend() {
  const el = document.getElementById('legend');
  const labeled = regions.filter(r => r.code);
  if (!labeled.length) { el.innerHTML = '<div class="empty">No labels yet</div>'; return; }
  const activeId = selectedRegion && selectedRegion.id;
  let html = `<div style="font-weight:600;margin-bottom:6px">Labels (${labeled.length}/${regions.length})</div><table><tr><th>Code</th><th>Braille</th><th>Name</th></tr>`;
  labeled.forEach(r => {
    const cls = r.id === activeId ? ' class="active"' : '';
    html += `<tr data-rid="${r.id}"${cls}><td>${r.code}</td><td class="bc">${toBraille(r.code, { compactDigits: r.compactDigits === true })}</td><td>${r.description||r.name}</td></tr>`;
  });
  html += '</table>';
  el.innerHTML = html;
  el.querySelectorAll('tr[data-rid]').forEach(tr => {
    tr.addEventListener('click', () => {
      const rid = parseInt(tr.dataset.rid);
      selectedRegion = regions.find(r => r.id === rid);
      resetAllColors();
      if (selectedRegion) highlightRegion(selectedRegion, SELECTED_COLOR);
      renderDetail();
    });
  });
  highlightLegendRow();
}

// Update the `.active` class on legend rows without rebuilding the table;
// scroll the matching row into view. Called every time the 3D selection
// changes so the right-side list mirrors what's selected on the model.
function highlightLegendRow() {
  const el = document.getElementById('legend');
  const activeId = selectedRegion && selectedRegion.id;
  let activeRow = null;
  el.querySelectorAll('tr[data-rid]').forEach(tr => {
    const on = activeId != null && +tr.dataset.rid === activeId;
    tr.classList.toggle('active', on);
    if (on) activeRow = tr;
  });
  if (activeRow) activeRow.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function updateStatus() {
  const labeled = regions.filter(r => r.code).length;
  document.getElementById('status').textContent =
    `${regions.length} regions | ${labeled} labeled` + (stlFileName ? ` | ${stlFileName}` : '');
}

}

  const mapContentText = buildMapContentText(labeled, base);
  const bundle = {
    stl_file: stlFileName,
    generated_at: new Date().toISOString(),
    uid_prefix: UID_PREFIX,
    next_uid: uidCounter + 1,
    blocks: labeled.map(r => ({
      id: r.id, uid: ensureUid(r),
      cx: +r.cx.toFixed(1), cy: +r.cy.toFixed(1), z: +r.z.toFixed(2),
      w: +r.w.toFixed(1), h: +r.h.toFixed(1),
      x_min: +(r.cx - r.w/2).toFixed(1), x_max: +(r.cx + r.w/2).toFixed(1),
      y_min: +(r.cy - r.h/2).toFixed(1), y_max: +(r.cy + r.h/2).toFixed(1),
      area: r.area, name: r.name, code: r.code, description: r.description,
      braille: toBraille(r.code, { compactDigits: r.compactDigits === true }),
      compactDigits: r.compactDigits === true,
      rotation: r.rotation || 0, scale: r.scale || 1.0,

    })),
    legend_text: legendText,

  };
  fetch('/save_labels', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(bundle) }).catch(()=>{});
  // Three siblings from one click: the JSON is the round-trippable source of

  triggerDownload(JSON.stringify(bundle, null, 2), `${base}_annotations.json`, 'application/json');
  triggerDownload(legendText, `${base}_legend.txt`, 'text/plain;charset=utf-8');
  triggerDownload(mapContentText, `${base}_mapcontent.txt`, 'text/plain;charset=utf-8');

document.getElementById('btn-import').addEventListener('click', () => {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.addEventListener('change', () => {
    const f = inp.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      const imported = JSON.parse(reader.result);
      if (imported.blocks) {
        // Restore UID counter from file before re-allocating.
        imported.blocks.forEach(ib => noteExistingUid(ib.uid));
        if (typeof imported.next_uid === 'number') {
          uidCounter = Math.max(uidCounter, imported.next_uid - 1);
        }
        // All labels placed by exact coordinates. No region matching.
        imported.blocks.forEach(ib => {
          if (!ib.code) return;
          const fl = {
            id: nextFreeId++, isFree: true, faceIndices: [],
            uid: ib.uid || allocUid(),
            cx: ib.cx, cy: ib.cy, z: ib.z,
            w: 0, h: 0, area: 0,
            name: ib.name || '', code: ib.code || '',
            description: ib.description || '',
            rotation: ib.rotation || 0, scale: ib.scale || 1.0,
            osm: ib.osm || null,
            compactDigits: ib.compactDigits === true,
          };
          freeLabels.push(fl);
          regions.push(fl);
          updateBrailleMesh(fl);
        });
        resetAllColors();
        renderLegend();
        renderDetail();
        updateStatus();
      }
    };
    reader.readAsText(f);
  });
  inp.click();
});

// ---- Synthesize & Download Merged STL ----
document.getElementById('btn-download-stl').addEventListener('click', () => {
  if (!stlMesh) { alert('Load an STL file first.'); return; }
  const labeled = regions.filter(r => r.code);
  if (!labeled.length) { alert('No labels to merge. Add braille labels first.'); return; }

  const statusEl = document.getElementById('status');
  statusEl.textContent = 'Generating merged STL...';

  setTimeout(() => {
    try {
      const exportScene = new THREE.Scene();

      // Clone STL geometry without vertex colors
      const geomClone = stlMesh.geometry.clone();
      geomClone.deleteAttribute('color');
      exportScene.add(new THREE.Mesh(geomClone, new THREE.MeshBasicMaterial()));

      // Clone all braille dot meshes
      for (const [rid, grp] of brailleMeshes) {
        exportScene.add(grp.clone());
      }

      // Adaptive bottom slab: guarantee at least BRAILLE_BASE_SAFETY_MM of
      // solid material below the lowest braille sphere. Idempotent across
      // repeated merges of an already-merged STL (no accumulation).
      geomClone.computeBoundingBox();
      const bb = geomClone.boundingBox;
      // Lowest dot-geometry point via bbox. Works for full sphere, hemisphere,
      // cylinder stem, or any future cap shape.
      let lowestDotBottom = Infinity;
      for (const [rid, grp] of brailleMeshes) {
        const box = new THREE.Box3().setFromObject(grp);
        if (isFinite(box.min.z)) lowestDotBottom = Math.min(lowestDotBottom, box.min.z);
      }
      const requiredBottom = lowestDotBottom - BRAILLE_BASE_SAFETY_MM;
      let baseGeom = null;
      let addedThickness = 0;
      if (isFinite(requiredBottom) && requiredBottom < bb.min.z) {
        addedThickness = bb.min.z - requiredBottom;
        const sx = bb.max.x - bb.min.x;
        const sy = bb.max.y - bb.min.y;
        baseGeom = new THREE.BoxGeometry(sx, sy, addedThickness);
        const baseMesh = new THREE.Mesh(baseGeom, new THREE.MeshBasicMaterial());
        baseMesh.position.set(
          (bb.min.x + bb.max.x) / 2,
          (bb.min.y + bb.max.y) / 2,
          bb.min.z - addedThickness / 2
        );
        exportScene.add(baseMesh);
      }

      const exporter = new STLExporter();
      const result = exporter.parse(exportScene, { binary: true });

      const blob = new Blob([result], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = stlFileName.replace('.stl', '_braille.stl');
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      geomClone.dispose();
      if (baseGeom) baseGeom.dispose();
      const baseMsg = addedThickness > 0
        ? `+${addedThickness.toFixed(2)}mm base`
        : 'base already sufficient';
      statusEl.textContent = `Downloaded: ${a.download} (${labeled.length} labels, ${baseMsg})`;
    } catch (e) {
      console.error('STL export error:', e);
      statusEl.textContent = 'Export failed: ' + e.message;
    }
  }, 50);
});

// Pure text builders — reused both by the in-browser export and by anyone who
// wants to re-generate the .txt outputs later from the single JSON bundle.
function buildLegendText(labeled, baseName) {
  let text = `Braille Legend: ${baseName}\n${'='.repeat(50)}\n`;
  text += `${'Code'.padStart(5)}  ${'Braille'.padStart(8)}  Name\n${'-'.repeat(50)}\n`;
  for (const r of labeled) {
    const name = r.description || r.name || r.code;
    text += `${r.code.padStart(5)}  ${toBraille(r.code, { compactDigits: r.compactDigits === true }).padStart(8)}  ${name}\n`;
  }
  return text;
}

// Touch Mapper style "Map content" grouped text. Uses the osm.mainClass /
// osm.subClass classification and osm.spatial hints we already attach. Runs
// fully in the browser from the in-memory regions — no Python, no server.
const MAP_CONTENT_SECTIONS = [
  ['C', 'C1_landmark',         'Landmarks'],
  ['C', 'C2_public',           'Public buildings'],
  ['C', 'C3_other_buildings',  'Buildings'],
  ['D', 'D1_transport',        'Transport'],
  ['D', 'D2_civic',            'Civic services'],
  ['D', 'D3_commercial',       'Shops and food'],
  ['D', 'D4_leisure_cultural', 'Leisure / cultural'],
  ['D', 'D_other_pois',        'Familiar places'],
];

function formatMapContentEntry(r) {
  const osm = r.osm || {};
  const name = r.description || r.name || osm.name || r.code || '(unnamed)';
  const head = [`  ${name}`];
  if (osm.category) head[0] += ` (${osm.category})`;
  if (r.code) head[0] += `  [${r.code}]`;
  const lines = [head[0]];
  const sp = osm.spatial || {};
  const bits = [];
  if (sp.position) bits.push(sp.position);
  if (sp.edge) bits.push(`touches ${sp.edge} edge`);
  if (sp.coveragePct != null) bits.push(`covers ${sp.coveragePct}% of view`);
  if (osm.lat != null && osm.lon != null) bits.push(`GPS ${(+osm.lat).toFixed(5)}, ${(+osm.lon).toFixed(5)}`);
  if (bits.length) lines.push('    ' + bits.join(' · '));
  const kt = osm.keyTags || {};
  const wiki = [];
  if (kt.wikipedia) wiki.push(`Wikipedia: https://en.wikipedia.org/wiki/${encodeURIComponent(kt.wikipedia.replace(/^en:/, ''))}`);
  if (kt.wikidata) wiki.push(`Wikidata:  https://www.wikidata.org/wiki/${kt.wikidata}`);
  if (osm.osm_id && osm.osm_type) wiki.push(`OSM:       https://www.openstreetmap.org/${osm.osm_type}/${osm.osm_id}`);
  for (const link of wiki) lines.push('    ' + link);
  return lines.join('\n');
}

function buildMapContentText(labeled, baseName) {
  const buckets = new Map();
  const unclassified = [];
  for (const r of labeled) {
    const osm = r.osm || {};
    const key = osm.mainClass && osm.subClass ? `${osm.mainClass}|${osm.subClass}` : null;
    if (key) {
      if (!buckets.has(key)) buckets.set(key, []);
      buckets.get(key).push(r);
    } else {
      unclassified.push(r);
    }
  }
  const sortByName = arr => arr.sort((a, b) => {
    const na = (a.description || a.name || '').toLowerCase();
    const nb = (b.description || b.name || '').toLowerCase();
    return na.localeCompare(nb);
  });
  const total = labeled.length;
  const named = labeled.filter(r => (r.osm || {}).name).length;
  let text = `Map content: ${baseName}\n${'='.repeat(Math.max(24, baseName.length + 13))}\n`;
  text += `${total} labels · ${named} OSM-linked\n\n`;
  const seen = new Set();
  for (const [main, sub, title] of MAP_CONTENT_SECTIONS) {
    const key = `${main}|${sub}`;
    const items = buckets.get(key);
    if (!items || !items.length) continue;
    seen.add(key);
    text += `${title}\n${'-'.repeat(title.length)}\n`;
    for (const r of sortByName(items.slice())) text += formatMapContentEntry(r) + '\n\n';
  }
  for (const [key, items] of buckets) {
    if (seen.has(key)) continue;
    const [main, sub] = key.split('|');
    const title = `${main} / ${sub}`;
    text += `${title}\n${'-'.repeat(title.length)}\n`;
    for (const r of sortByName(items.slice())) text += formatMapContentEntry(r) + '\n\n';
  }
  if (unclassified.length) {
    text += `Unclassified\n${'-'.repeat('Unclassified'.length)}\n`;
    for (const r of sortByName(unclassified.slice())) text += formatMapContentEntry(r) + '\n\n';
  }
  return text.trimEnd() + '\n';
}

const leafletMap = L.map('leaflet-map').setView([37.3195, -122.0449], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 20, attribution: '&copy; OpenStreetMap'
